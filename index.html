<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk DA/PA Checker</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f6f9;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #aaa; }
        pre {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 13px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Bulk DA/PA Checker</h2>
    <label for="domains">Enter domains (separated by commas):</label>
    <textarea id="domains">youtube.com, google.com</textarea>
    
    <button id="checkBtn">Check Metrics</button>

    <h3>API Response:</h3>
    <pre id="output">Results will appear here...</pre>
</div>

<script>
document.getElementById('checkBtn').addEventListener('click', async function() {
    const btn = this;
    const output = document.getElementById('output');
    const domainValue = document.getElementById('domains').value;

    // Clean domains format
    const cleanDomains = domainValue.split(',').map(d => d.trim()).join(',');

    // Format body payload to match content-type x-www-form-urlencoded
    const payload = new URLSearchParams();
    payload.append('domains', cleanDomains);

    btn.disabled = true;
    btn.innerText = 'Checking...';
    output.innerText = 'Fetching data...';

    // Corrected configuration variables from your screenshot:
    const apiKey = 'ce77d538damsh1436346bc2d9fb3p13ae23jsn1fe6e98794d2';
    const apiHost = 'bulk-ahref-da-pa-checker.p.rapidapi.com'; 
    const apiUrl = 'https://bulk-ahref-da-pa-checker.p.rapidapi.com/bulk-dapa.php';

    try {
        const response = await fetch(apiUrl, {
            method: 'POST',
            headers: {
                'x-rapidapi-key': apiKey,
                'x-rapidapi-host': apiHost,
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: payload
        });

        const textResult = await response.text();

        if (response.ok) {
            try {
                const jsonResult = JSON.parse(textResult);
                output.innerText = JSON.stringify(jsonResult, null, 2);
            } catch {
                output.innerText = textResult;
            }
        } else {
            output.innerText = `Error ${response.status}: ${response.statusText}\n\n${textResult}`;
        }

    } catch (error) {
        output.innerText = `Network Error: ${error.message}\nIf this happens, check if an adblocker extension is blocking the connection.`;
    } finally {
        btn.disabled = false;
        btn.innerText = 'Check Metrics';
    }
});
</script>

</body>
</html>
