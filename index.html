<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk DA/PA Checker</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f6f9;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #aaa; }
        pre {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 13px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Bulk DA/PA Checker</h2>
    <label for="domains">Enter domains (separated by commas):</label>
    <textarea id="domains">youtube.com, google.com</textarea>
    
    <button id="checkBtn">Check Metrics</button>

    <h3>API Response:</h3>
    <pre id="output">Results will appear here...</pre>
</div>

<script>
document.getElementById('checkBtn').addEventListener('click', function() {
    const btn = this;
    const output = document.getElementById('output');
    const domainValue = document.getElementById('domains').value;

    // Clean inputs and construct payload
    const cleanDomains = domainValue.split(',').map(d => d.trim()).join(',');
    const data = 'domains=' + encodeURIComponent(cleanDomains);

    btn.disabled = true;
    btn.innerText = 'Checking...';
    output.innerText = 'Fetching data...';

    const xhr = new XMLHttpRequest();
    
    // NOTE: xhr.withCredentials = true; has been removed to prevent CORS issues.

    xhr.addEventListener('readystatechange', function () {
        if (this.readyState === this.DONE) {
            btn.disabled = false;
            btn.innerText = 'Check Metrics';

            if (this.status === 200) {
                try {
                    // Try to format the response nicely if it's JSON
                    const parsed = JSON.parse(this.responseText);
                    output.innerText = JSON.stringify(parsed, null, 2);
                } catch(e) {
                    output.innerText = this.responseText;
                }
            } else {
                output.innerText = `Status Error: ${this.status}\nResponse: ${this.responseText}`;
            }
        }
    });

    xhr.open('POST', 'https://bulk-ahref-da-pa-checker5.p.rapidapi.com/bulk-dapa.php');
    xhr.setRequestHeader('x-rapidapi-key', 'ce77d538damsh1436346bc2d9fb3p13ae23jsn1fe6e98794d2');
    xhr.setRequestHeader('x-rapidapi-host', 'bulk-ahref-da-pa-checker5.p.rapidapi.com');
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');

    xhr.send(data);
});
</script>

</body>
</html>
